<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b3c5d" />
    <title>NutriPath AI | Resource Map</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body data-page="map">
    <header class="topbar">
      <div class="container nav">
        <a class="brand" href="./index.html"><span class="brand-mark">N</span><span>NutriPath AI</span></a>
        <nav class="nav-links" aria-label="Primary navigation">
          <a class="nav-link" data-nav="home" href="./index.html">Home</a>
          <a class="nav-link" data-nav="assessment" href="./assessment.html">Assessment</a>
          <a class="nav-link" data-nav="results" href="./results.html">Results</a>
          <a class="nav-link" data-nav="map" href="./map.html">Resource Map</a>
          <a class="nav-link" data-nav="dashboard" href="./dashboard.html">Program Dashboard</a>
          <a class="nav-link" data-nav="learn" href="./learn.html">Learning Hub</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-header">
        <h1 class="page-title">Food and Health Resource Locator</h1>
        <p class="page-desc">Find nearby clinics, NGO support, and food distribution points, then prioritize referrals based on risk level.</p>
      </section>

      <section class="section map-shell">
        <aside class="card">
          <div class="field">
            <label for="map-community">Community center</label>
            <select id="map-community"></select>
          </div>
          <div class="field">
            <label for="resource-type">Resource type</label>
            <select id="resource-type">
              <option value="All">All</option>
              <option value="Clinic">Clinic</option>
              <option value="Food Support">Food Support</option>
              <option value="NGO">NGO</option>
            </select>
          </div>
          <div class="field">
            <label for="max-distance">Max distance (km)</label>
            <input id="max-distance" type="range" min="3" max="40" value="20" />
            <small id="distance-label" class="small-text">20 km</small>
          </div>
          <div class="cta-row" style="margin-top: 0.4rem;">
            <button id="locate-btn" class="btn btn-secondary" type="button">Use my location</button>
            <button id="apply-map-filter" class="btn btn-primary" type="button">Apply filters</button>
          </div>
          <hr style="border: 0; border-top: 1px solid rgba(11, 60, 93, 0.1); margin: 1rem 0;" />
          <h3>Nearby resources</h3>
          <div id="resource-list" class="resource-list"></div>
        </aside>

        <section>
          <div id="resource-map" aria-label="Resource map"></div>
        </section>
      </section>
    </main>

    <footer class="container footer">NutriPath AI for Fuel the Future Hackathon · <span id="year"></span></footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
    <script src="./map.js"></script>
  </body>
</html>
